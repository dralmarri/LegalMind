services:
  postgres:
    image: postgres:16-alpine
    container_name: legalmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    expose:
      - "5432"
    volumes:
      - ${LEGALMIND_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: legalmind-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT}:6334"
    volumes:
      - ${LEGALMIND_DATA_DIR}/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: legalmind-network
