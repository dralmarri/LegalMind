name: Legal Knowledge Validation
on:
  push:
    paths:
      - 'knowledge-system/**'
      - '.github/workflows/legal-knowledge-validation.yml'
  pull_request:
    paths:
      - 'knowledge-system/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate knowledge data
        run: python knowledge-system/scripts/validate_knowledge.py
      - name: Compile ingestion scripts
        run: python -m py_compile knowledge-system/scripts/*.py
